<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/11135/11135314.png">
  <title>Reset Password</title>
</head>
<body align = "center" >
  <h1>Reset Your Password</h1>
  <form  >
    <label for="email">Email:</label><br>
    <input id="email" type="email" placeholder="Enter your email" required><br><br>

    <label for="new-pass">New Password:</label><br>
    <input id="new-pass" type="password" placeholder="New Password" required><br><br>

    <label for="confirm-pass">Confirm Password:</label><br>
    <input id="confirm-pass" type="password" placeholder="Confirm Password" required><br><br>

    <input type="submit" value="Update Password">
  </form>
</body>
</html>
